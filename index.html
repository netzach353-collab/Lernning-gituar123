<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פאנל גלילה</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;
}

#panel{
  width:100%;
  height:100vh;
  background:#000;
  color:#fff;
  border:none;
  outline:none;
  resize:none;
  padding:80px 20px 120px;
  font-size:18px;
  line-height:1.7;

  direction:rtl;
  text-align:right;
  unicode-bidi:plaintext;

  font-family:monospace;
  white-space:pre;

  overflow-x:auto;
  overflow-y:auto;
}
  
#panel{
  unicode-bidi: plaintext;
}
  
.controls{
  position:fixed;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  width:24px;
  background:rgba(120,120,120,.45);
  border-radius:30px;
  padding:7px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
  z-index:999;
}

.controls button{
  width:24px;
  height:24px;
  border:none;
  border-radius:50%;
  background:#555;
  color:white;
  font-size:22px;
  font-weight:bold;
  opacity: 0.50;
}

#speed{
  font-size:12px;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<textarea
  id="panel"
  wrap="off"
  spellcheck="false"
  placeholder="הדבק כאן את הטקסט שלך">
</textarea>
  
<div class="controls">
  <button onclick="changeSpeed(0.05)">+</button>
  <div id="speed">1.0</div>
  <button onclick="changeSpeed(-0.05)">−</button>
  <button onclick="toggleScroll()" id="playBtn">▶</button>
  <button onclick="toggleDirection()" id="dirBtn">↓</button>
</div>

<script>
const panel = document.getElementById("panel");
const speedText = document.getElementById("speed");
const playBtn = document.getElementById("playBtn");
const dirBtn = document.getElementById("dirBtn");

let running = false;
let speed = 0.10;
let direction = 1;
let lastTime = null;
let scrollPosition = 0;

speedText.textContent = speed.toFixed(2);

function autoScroll(time) {
  if (!running) return;

  if (lastTime === null) {
    lastTime = time;
  }

  const delta = time - lastTime;
  lastTime = time;

  // שומרים מיקום מדויק גם במהירויות נמוכות
  scrollPosition += direction * speed * delta * 0.02;

  panel.scrollTop = scrollPosition;

  // עצירה אוטומטית בסוף או בהתחלה
  const maxScroll = panel.scrollHeight - panel.clientHeight;

  if (scrollPosition >= maxScroll) {
    scrollPosition = maxScroll;
    panel.scrollTop = maxScroll;
    stopScroll();
    return;
  }

  if (scrollPosition <= 0) {
    scrollPosition = 0;
    panel.scrollTop = 0;

    if (direction === -1) {
      stopScroll();
      return;
    }
  }

  requestAnimationFrame(autoScroll);
}

function toggleScroll() {
  running = !running;

  if (running) {
    scrollPosition = panel.scrollTop;
    lastTime = null;
    playBtn.textContent = "⏸";
    requestAnimationFrame(autoScroll);
  } else {
    stopScroll();
  }
}

function stopScroll() {
  running = false;
  lastTime = null;
  playBtn.textContent = "▶";
}

function toggleDirection() {
  direction *= -1;
  dirBtn.textContent = direction === 1 ? "↓" : "↑";

  scrollPosition = panel.scrollTop;
  lastTime = null;
}

function changeSpeed(amount) {
  speed += amount;

  if (speed < 0.02) speed = 0.02;
  if (speed > 0.50) speed = 0.50;

  speed = Math.round(speed * 100) / 100;
  speedText.textContent = speed.toFixed(2);
}

// אם גוללים ידנית, מעדכנים את המיקום
panel.addEventListener("scroll", function () {
  if (!running) {
    scrollPosition = panel.scrollTop;
  }
});

// לחיצה כפולה על הטקסט מפעילה ועוצרת
panel.addEventListener("dblclick", toggleScroll);
</script>


</body>
</html>
